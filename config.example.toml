# tq config — copy to ~/.config/tq/config.toml and edit.

[daemon]
host = "127.0.0.1"
port = 7788
db_path = "~/.local/share/tq/tq.db"
attachments_dir = "~/.local/share/tq/attachments"

[triage]
provider = "amazon-bedrock"
model = "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
concurrency = 3
max_attempts = 3
auto_create_confidence = 0.8
label_vocabulary = ["project", "person", "area", "ticket", "source", "repo"]

[embeddings]
model = "amazon.titan-embed-text-v2:0"
dims = 1024

[aws]
region = "us-east-1"

[client]
actor = "human:laci"
# token = "..."           # optional; overrides actor header
# url = "http://127.0.0.1:7788"  # optional; defaults to daemon host:port

[secrets]
github = { env = "GITHUB_TOKEN" }
